<!DOCTYPE html>
<html lang="en" style="--accent: oklch(0.52 0.14 27);">

<meta charset="utf-8">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<style>
  :root {
    --paper:   #F2ECE0;
    --paper-2: #EAE2D2;
    --paper-3: #E3D9C5;
    --ink:     #141210;
    --ink-2:   #3A342C;
    --ink-3:   #6B6456;
    --rule:          #1412101a;
    --rule-strong:   #14121033;
    --accent:        oklch(0.52 0.14 27);
    --accent-ink:    #FAF6EC;
    --ok:    oklch(0.52 0.10 150);
    --warn:  oklch(0.62 0.14 70);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }

  body {
    font-family: 'Melodrama', serif;
    font-weight: 400;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }

  .mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; letter-spacing: -0.01em; }
  .serif { font-family: 'Melodrama', serif; font-weight: 400; letter-spacing: -0.01em; }
  .cap   { text-transform: uppercase; letter-spacing: 0.12em; font-size: 11px; font-weight: 600; }
  a { color: inherit; }
  ::selection { background: var(--ink); color: var(--paper); }

  /* ── Smooth scrolling ── */
  html { scroll-behavior: smooth; }

  /* ── Global transition polish ── */
  *, *::before, *::after {
    transition-timing-function: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* ── Scroll-reveal base state ── */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }

  /* ── Hero entrance ── */
  @keyframes heroFadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hero-enter           { animation: heroFadeUp 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
  .hero-enter-delay-1   { animation-delay: 0.15s; }
  .hero-enter-delay-2   { animation-delay: 0.30s; }
  .hero-enter-delay-3   { animation-delay: 0.45s; }
  .hero-enter-delay-4   { animation-delay: 0.60s; }

  /* ── Ticker ── */
  @keyframes tickerScrollSmooth {
    from { transform: translateX(0); }
    to   { transform: translateX(-33.333%); }
  }

  /* ── Hover micro-interactions ── */
  a, button {
    transition: opacity 0.2s ease, color 0.2s ease,
                background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }

  /* ── Paper grain overlay ── */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background-image:
      radial-gradient(circle at 20% 30%, #0000000a 0, transparent 50%),
      radial-gradient(circle at 80% 70%, #0000000a 0, transparent 50%);
    mix-blend-mode: multiply;
  }
</style>

<!-- Scroll-reveal observer (runs after React mounts) -->
<script>
  (function () {
    function initReveal() {
      document.querySelectorAll('section, h1, h2, h3, p, li').forEach(function (el, i) {
        if (!el.closest('.ticker-track')) {
          el.classList.add('reveal');
          var delay = Math.min(i % 5, 4);
          if (delay > 0) el.classList.add('reveal-delay-' + delay);
        }
      });
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.reveal').forEach(function (el) { io.observe(el); });
    }
    document.addEventListener('DOMContentLoaded', function () { setTimeout(initReveal, 600); });
  })();
</script>

<!-- Default tweaks -->
<script>
  window.__TWEAKS = {
    accent:       'oxblood',
    heroVariant:  'editorial',
    showTicker:   true,
    denseSyllabus: false,
  };
</script>
